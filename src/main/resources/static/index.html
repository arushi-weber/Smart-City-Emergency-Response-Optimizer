<!DOCTYPE html>
<html>
<head>
    <title>Emergency</title>
	<link rel="stylesheet" href="style.css">

<style>

.box {
    background: white;
    padding: 30px;
    width: 380px;
    margin: 50px auto;
    border-radius: 15px;

    box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: 0.2s;
}

input:focus, select:focus {
    border-color: #2563eb;
    outline: none;
    box-shadow: 0 0 5px rgba(37, 99, 235, 0.5);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;

    background: linear-gradient(to right, #2563eb, #1e3a8a);
    color: white;
    font-weight: bold;

    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    background: linear-gradient(to right, #1e3a8a, #2563eb);
}

#result {
    margin-top: 15px;
    color: #16a34a;
    font-weight: bold;
    text-align: center;
}

.box h3 {
    margin-bottom: 10px;
    color: #1e3a8a;
    text-align: center;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 12px 0;

    border-radius: 8px;
    border: 1px solid #ccc;

    font-size: 14px;

    box-sizing: border-box;   
    height: 45px;             
}

</style>

</head>

<body>

<div class="header">Smart City Emergency Response Optimizer</div>

<div class="nav">
    <a href="index.html">Emergency</a>
    <a href="history.html">History</a>
    <a href="map.html">Map</a>
</div>

<div class="box">
    <h3>Send Emergency</h3>
	<p style="text-align:center; color:gray;">
	    Enter details to dispatch emergency services
	</p>

    <input type="number" id="location" placeholder="Enter Location (1-20)">

    <select id="type">
        <option>Fire</option>
        <option>Accident</option>
        <option>Theft</option>
    </select>

    <button onclick="sendEmergency()">Send</button>

    <div id="result"></div>
</div>

<div class="footer">
	    Emergency System | Built by Digital Damsels
	    <span>For academic/demo purposes only</span>
</div>

<script>
	function sendEmergency() {
	    let location = document.getElementById("location").value;
	    let type = document.getElementById("type").value;


	    if (!location || location < 1 || location > 20) {
	        alert("Please enter a valid location between 1 and 20");
	        return;
	    }

	    let data = [{
	        location: parseInt(location),
	        priority: 1,
	        type: type
	    }];

	    fetch("/emergency", {
	        method: "POST",
	        headers: {"Content-Type": "application/json"},
	        body: JSON.stringify(data)
	    })
	    .then(res => {
	        if (!res.ok) {
	            throw new Error("Server error");
	        }
	        return res.text();
	    })
	    .then(result => {
	        document.getElementById("result").innerText = result;
	    })
	    .catch(() => {
	        document.getElementById("result").innerText =
	            "Something went wrong. Please try again.";
	    });
	}
</script>

</body>
</html>
