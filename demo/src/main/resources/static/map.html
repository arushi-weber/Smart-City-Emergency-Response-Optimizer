<!DOCTYPE html>
<html>
<head>
<title>Map</title>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

#map {
    height: 400px;
    width: 80%;

    margin: 30px auto;   
    border-radius: 12px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.map-controls {
    text-align: center;
    margin-top: 20px;
}


.map-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;

    margin-top: 25px;
}

.map-controls input {
    padding: 12px 15px;
    width: 220px;

    border-radius: 8px;
    border: 1px solid #ccc;

    font-size: 14px;
    outline: none;

    transition: 0.3s;
}

.map-controls input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 6px rgba(37, 99, 235, 0.5);
}

.map-controls button {
    padding: 12px 18px;

    border-radius: 8px;
    border: none;

    background: linear-gradient(to right, #2563eb, #1e3a8a);
    color: white;
    font-weight: bold;

    cursor: pointer;
    transition: 0.3s;
}

.map-controls button:hover {
    transform: scale(1.05);
}
	
</style>

</head>

<body>

<div class="header">Emergency Map</div>

<div class="nav">
    <a href="index.html">Emergency</a>
    <a href="history.html">History</a>
    <a href="map.html">Map</a>
</div>

<div class="map-controls">
    <input type="number" id="location" placeholder="Enter Location">
    <button onclick="loadMap()">Show</button>
</div>

<div id="map"></div>
<div class="footer">
	    Emergency System | Built by Digital Damsels
	    <span>For academic/demo purposes only</span>
	</div>

<script>
const nodeMap = {
    1:[28.61,77.23],
    2:[28.62,77.25],
    3:[28.63,77.20],
    5:[28.60,77.22]
};

let map;

function loadMap(){
    let loc = document.getElementById("location").value;

    if(map) map.remove();

    map = L.map('map').setView([28.61,77.23],12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    if(nodeMap[loc]){
        L.marker(nodeMap[loc]).addTo(map)
        .bindPopup("Emergency at Node "+loc).openPopup();
    }
}
</script>

</body>
</html>
